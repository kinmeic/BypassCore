syntax = "proto3";

package bypasscore.common.net;
option csharp_namespace = "Bypasscore.Common.Net";
option go_package = "github.com/eugene/bypasscore/common/net";
option java_package = "com.bypasscore.common.net";
option java_multiple_files = true;

enum Network {
  Unknown = 0;

  TCP = 2;
  UDP = 3;
  UNIX = 4;
}

// NetworkList is a list of Networks.
message NetworkList { repeated Network network = 1; }
