name: Test OpenWrt packages

# Dry-run: build .ipk and .apk packages on push to main and upload them as CI
# artifacts (NOT a release). Lets us verify the packages are well-formed before
# wiring them into the real Release workflow.
on:
  push:
    branches: [main]
    paths:
      - 'scripts/ipkg-build'
      - 'scripts/package-openwrt.sh'
      - '.github/workflows/test-packages.yml'
  workflow_dispatch:

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Build static binaries for both OpenWrt archs
        run: |
          mkdir -p dist
          VERSION="1.0.5"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 GOAMD64=v1 go build -ldflags="$LDFLAGS" -o dist/bypasscore-openwrt-x86_64             ./cmd/bypasscore
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64              go build -ldflags="$LDFLAGS" -o dist/bypasscore-openwrt-aarch64_cortex-a53 ./cmd/bypasscore

      - name: Package x86_64 (.ipk + .apk)
        run: |
          mkdir -p pkgout
          scripts/package-openwrt.sh dist/bypasscore-openwrt-x86_64 x86_64 1.0.5 pkgout

      - name: Package aarch64_cortex-a53 (.ipk + .apk)
        run: |
          scripts/package-openwrt.sh dist/bypasscore-openwrt-aarch64_cortex-a53 aarch64_cortex-a53 1.0.5 pkgout

      - name: Verify packages are well-formed
        run: |
          echo "--- .ipk contents (x86_64) ---"
          mkdir -p /tmp/ipk && tar xzf pkgout/bypasscore_1.0.5_x86_64.ipk -C /tmp/ipk
          echo "debian-binary: $(cat /tmp/ipk/debian-binary)"
          echo "control.tar.gz members:"; tar tzf /tmp/ipk/control.tar.gz
          echo "data.tar.gz members:";     tar tzf /tmp/ipk/data.tar.gz
          echo
          echo "--- .apk header (x86_64) ---"
          # apk v3 uses an ADB container (magic 'ADBd'), not a plain tar.
          xxd pkgout/bypasscore-1.0.5_x86_64.apk | head -1
          echo
          ls -la pkgout/

      - name: Verify .apk is a valid package (in-container)
        run: |
          # Confirm the ADB-format .apk is a valid package by having apk-tools
          # itself inspect it inside alpine:edge (which ships apk v3.0.6).
          # `apk manifest` prints the package manifest (name/version/arch) and
          # exits 0 on a well-formed package; a malformed one exits non-zero.
          docker run --rm \
            -v "$PWD/pkgout:/pkg:ro" \
            alpine:edge \
            sh -c "apk manifest /pkg/bypasscore-1.0.5_x86_64.apk; echo 'exit code:' \$?"

      - name: Upload packages as CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-packages
          path: pkgout/*
