name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Verify Linux transparent proxy data plane
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iproute2 iptables
          sudo modprobe xt_TPROXY || true
          integration/netns/run.sh

      - name: Install UPX
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq upx

      - name: Build all targets
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          # linux x86_64
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 GOAMD64=v1 go build -ldflags="$LDFLAGS" -o dist/bypasscore-linux-x86_64                 ./cmd/bypasscore

          # darwin arm64
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64               go build -ldflags="$LDFLAGS" -o dist/bypasscore-darwin-arm64                ./cmd/bypasscore

          # darwin x86_64
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 GOAMD64=v1   go build -ldflags="$LDFLAGS" -o dist/bypasscore-darwin-x86_64               ./cmd/bypasscore

          # openwrt x86_64 (static, musl-compatible)
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 GOAMD64=v1   go build -ldflags="$LDFLAGS" -o dist/bypasscore-openwrt-x86_64             ./cmd/bypasscore

          # openwrt aarch64_cortex-a53 (ARMv8-A)
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64              go build -ldflags="$LDFLAGS" -o dist/bypasscore-openwrt-aarch64_cortex-a53 ./cmd/bypasscore

          # UPX compress OpenWrt binaries only (saves ~60% on flash-constrained devices)
          upx --best --lzma dist/bypasscore-openwrt-x86_64
          upx --best --lzma dist/bypasscore-openwrt-aarch64_cortex-a53

      - name: Build OpenWrt .ipk + .apk installable packages
        run: |
          # Version from the tag name (strip leading 'v'); e.g. v1.0.6 -> 1.0.6
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/pkgout

          scripts/package-openwrt.sh dist/bypasscore-openwrt-x86_64                x86_64                "$VERSION" dist/pkgout
          scripts/package-openwrt.sh dist/bypasscore-openwrt-aarch64_cortex-a53   aarch64_cortex-a53    "$VERSION" dist/pkgout

      - name: Package each binary
        run: |
          cd dist
          for f in bypasscore-*; do
            [ -f "$f" ] || continue
            tar -czf "$f.tar.gz" "$f"
            echo "✓ $f.tar.gz ($(du -h "$f.tar.gz" | cut -f1)) — binary $(du -h "$f" | cut -f1)"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/pkgout/*.ipk
            dist/pkgout/*.apk
          generate_release_notes: true
