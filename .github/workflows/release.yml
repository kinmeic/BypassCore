name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (for example v1.0.9)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'

      - name: Validate release tag and source
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid release tag: $RELEASE_TAG" >&2
            exit 1
          }
          test -z "$(git status --porcelain)"

      - name: Unit, race, static and vulnerability checks
        run: |
          go test -race -count=1 ./...
          go vet ./...
          go run honnef.co/go/tools/cmd/staticcheck@v0.6.1 ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

      - name: Verify Linux transparent proxy data plane
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq iproute2 iptables nftables
          sudo modprobe xt_TPROXY || true
          go test -c -o /tmp/bypasscore-dnsnftset.test ./app/dnsnftset
          sudo env BYPASSCORE_NFTSET_INTEGRATION=1 /tmp/bypasscore-dnsnftset.test -test.count=1 -test.run '^TestKernelNFTSetWriter$' -test.v
          integration/netns/run.sh

      - name: Install UPX
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq upx

      - name: Build all targets
        run: |
          mkdir -p dist
          VERSION="${RELEASE_TAG#v}"
          COMMIT="${GITHUB_SHA}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}"

          # linux x86_64
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 GOAMD64=v1 go build -ldflags="$LDFLAGS" -o dist/bypasscore-linux-x86_64                 ./cmd/bypasscore

          # darwin arm64
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64               go build -ldflags="$LDFLAGS" -o dist/bypasscore-darwin-arm64                ./cmd/bypasscore

          # darwin x86_64
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 GOAMD64=v1   go build -ldflags="$LDFLAGS" -o dist/bypasscore-darwin-x86_64               ./cmd/bypasscore

          # openwrt x86_64 (static, musl-compatible)
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 GOAMD64=v1   go build -ldflags="$LDFLAGS" -o dist/bypasscore-openwrt-x86_64             ./cmd/bypasscore

          # openwrt aarch64_cortex-a53 (ARMv8-A)
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64              go build -ldflags="$LDFLAGS" -o dist/bypasscore-openwrt-aarch64_cortex-a53 ./cmd/bypasscore

          # UPX compress OpenWrt binaries only (saves ~60% on flash-constrained devices)
          upx --best --lzma dist/bypasscore-openwrt-x86_64
          upx --best --lzma dist/bypasscore-openwrt-aarch64_cortex-a53

      - name: Build OpenWrt .ipk + .apk installable packages
        run: |
          # Version from the tag name (strip leading 'v').
          VERSION="${RELEASE_TAG#v}"
          mkdir -p dist/pkgout

          scripts/package-openwrt.sh dist/bypasscore-openwrt-x86_64                x86_64                "$VERSION" dist/pkgout
          scripts/package-openwrt.sh dist/bypasscore-openwrt-aarch64_cortex-a53   aarch64_cortex-a53    "$VERSION" dist/pkgout

      - name: Package each binary
        run: |
          cd dist
          for f in bypasscore-*; do
            [ -f "$f" ] || continue
            tar -czf "$f.tar.gz" "$f"
            echo "✓ $f.tar.gz ($(du -h "$f.tar.gz" | cut -f1)) — binary $(du -h "$f" | cut -f1)"
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist
          format: spdx-json
          output-file: dist/SBOM.spdx.json

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/pkgout/*.ipk
            dist/pkgout/*.apk
            dist/SBOM.spdx.json
            dist/SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*.tar.gz
            dist/pkgout/*.ipk
            dist/pkgout/*.apk
            dist/SBOM.spdx.json
            dist/SHA256SUMS
          generate_release_notes: true
